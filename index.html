<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Andreas Lacza</title>
  <meta name="description" content="YouTuber // Content Creator">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Andreas Lacza">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.andreaslacza.com/">
  <meta property="og:image" content="https://www.andreaslacza.com/images/andreaslacza-logo.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:description" content="YouTuber // Content Creator">
  <meta property="og:site_name" content="Andreas Lacza">
  <meta name="theme-color" content="#000000">
  <style>
    html {
      font-family: Futura, sans-serif;
      font-size: 18px;
      line-height: 1;
      -webkit-text-size-adjust: 100%;
    }
    body {
      background-color: #000000;
      color: #ffffff;
      margin: 0;
    }
    article {
      margin-left: auto;
      margin-right: auto;
      max-width: 600px;
      position: relative;
      width: 90%;
    }
    h1 {
      font-size: 48px;
      text-transform: uppercase;
    }
    @media (min-width: 320px) {
      h1 {
        font-size: 54px;
      }
    }
    @media (min-width: 375px) {
      h1 {
        font-size: 64px;
      }
    }
    @media (min-width: 414px) {
      h1 {
        font-size: 70px;
      }
    }
    a {
      background-color: transparent;
      color: inherit;
      display: block;
      text-decoration: none;
    }
    span {
      color: transparent;
      -webkit-text-stroke-color: #ffffff;
      -webkit-text-stroke-width: 1px;
    }
    section {
      font-size: 34px;
      font-weight: bolder;
    }
    @media (min-width: 375px) {
      section {
        font-size: 40px;
      }
    }
    ul {
      list-style-type: none;
      padding-left: 0;
      text-transform: uppercase;
    }
    li {
      margin-top: 4px;
    }
    footer {
      color: #888888;
      font-size: 12px;
    }
    p {
      line-height: 1.5;
    }
    p a {
      text-decoration: underline;
    }
    #dialog {
      background-color: #000000;
      display: none;
      height: 100%;
      left: 0;
      position: fixed;
      top: 0;
      width: 100%;
    }
    #close {
      float: right;
    }
  </style>
</head>
<body>
<article>
  <h1><a href="https://www.andreaslacza.com/"><span>Andreas</span><br>Lacza</a></h1>
  <section>
    <ul>
      <li><a href="https://www.youtube.com/channel/UCdakjwVKJTSJMders4JxVqA?sub_confirmation=1" target="_blank">YouTube</a></li>
      <li><a href="https://www.instagram.com/andreaslacza/" target="_blank">Instagram</a></li>
      <li><a href="https://twitter.com/andreaslacza" target="_blank">Twitter</a></li>
      <li><a href="https://www.facebook.com/andreaslacza" target="_blank">Facebook</a></li>
      <li><a href="https://www.tiktok.com/@andreaslacza" target="_blank">TikTok</a></li>
      <li><a href="https://kit.co/andreaslacza" target="_blank">Kit</a></li>
    </ul>
  </section>
  <footer>
    <ul>
      <li><a id="open" href="#">Datenschutz</a></li>
      <li><a href="mailto:andreas.lacza@gmail.com">Kontakt</a></li>
    </ul>
    <p id="copyright"></p>
  </footer>
</article>
<div id="dialog">
  <article>
    <h1><span>Daten</span><a id="close" href="#">&times;</a><br>schutz</h1>
    <p>Diese Website wird über <a href="https://pages.github.com/" target="_blank">GitHub Pages</a> veröffentlicht. Hier gilt die <a href="https://docs.github.com/en/site-policy/privacy-policies" target="_blank">Datenschutzerklärung</a> von GitHub, Inc.</p>
  </article>
</div>
<script>
    const copyright = document.getElementById("copyright");
    copyright.innerText = "© " + new Date().getFullYear() + " Andreas Lacza";
    const dialog = document.getElementById("dialog");
    const open = document.getElementById("open");
    open.addEventListener("click", function () {
        dialog.style.display = "block";
    });
    const close = document.getElementById("close");
    close.addEventListener("click", function () {
        dialog.style.display = "none";
    });
</script>
</body>
</html>
